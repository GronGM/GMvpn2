name: android

# Two-stage Android pipeline:
#
#   libs  — produce libgmvpn_ffi.so for the four Android ABIs, the
#           generated UniFFI Kotlin bindings, and the gomobile-bound
#           gmvpn.aar.
#   apk   — pull the libs artifact, drop it into clients/android/app/,
#           run `./gradlew :app:assembleDebug`, upload the APK.
#
# Triggers on changes that can affect either side. apk depends on libs
# so a single failure path is reflected in the run.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "shared/**"
      - "core/**"
      - "clients/android/**"
      - "scripts/build-android-libs.sh"
      - ".github/workflows/android-aar.yml"
  pull_request:
    paths:
      - "shared/**"
      - "core/**"
      - "clients/android/**"
      - "scripts/build-android-libs.sh"
      - ".github/workflows/android-aar.yml"

jobs:
  libs:
    name: cargo-ndk + gomobile bind
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ANDROID_NDK_VERSION: "28.2.13676358"

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            shared/target
          key: android-libs-${{ runner.os }}-${{ hashFiles('shared/**/Cargo.toml', 'shared/**/Cargo.lock') }}
          restore-keys: |
            android-libs-${{ runner.os }}-

      - name: Install cargo-ndk
        run: cargo install --locked cargo-ndk

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: core/go.sum

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
          add-to-path: false

      - name: Export ANDROID_NDK_HOME
        run: echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build everything
        run: ./scripts/build-android-libs.sh

      - name: Check native ELF page alignment
        run: |
          ./scripts/check-android-16kb-elf-alignment.sh shared/target/android/jniLibs
          ./scripts/check-android-16kb-elf-alignment.sh core/build/gmvpn.aar

      - name: Stage artifact tree
        run: |
          mkdir -p artifact/jniLibs artifact/kotlin
          cp -R shared/target/android/jniLibs/* artifact/jniLibs/
          cp -R shared/target/android/kotlin/* artifact/kotlin/
          cp core/build/gmvpn.aar artifact/

      - name: Upload libs artifact
        uses: actions/upload-artifact@v7
        with:
          name: gmvpn-android-libs-${{ github.sha }}
          path: artifact/
          if-no-files-found: error
          retention-days: 14

  apk:
    name: assembleDebug
    needs: libs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            clients/android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('clients/android/**/*.gradle*', 'clients/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Download libs artifact
        uses: actions/download-artifact@v8
        with:
          name: gmvpn-android-libs-${{ github.sha }}
          path: artifact

      - name: Wire artifacts into app/
        run: |
          set -euxo pipefail
          mkdir -p clients/android/app/libs
          mkdir -p clients/android/app/src/main/jniLibs
          mkdir -p clients/android/app/src/main/kotlin/uniffi/gmvpn_ffi

          cp artifact/gmvpn.aar clients/android/app/libs/
          cp -R artifact/jniLibs/* clients/android/app/src/main/jniLibs/
          # The committed gmvpn_ffi.kt is the baseline; the freshly built
          # one must match its surface, so overwrite to catch drift early.
          cp artifact/kotlin/uniffi/gmvpn_ffi/gmvpn_ffi.kt \
             clients/android/app/src/main/kotlin/uniffi/gmvpn_ffi/

      - name: Make gradlew executable
        run: chmod +x clients/android/gradlew

      - name: Unit tests with coverage
        working-directory: clients/android
        run: |
          ./gradlew :app:testDebugUnitTest :app:koverHtmlReportDebug \
            --stacktrace

      - name: Upload kover report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gmvpn-android-coverage-${{ github.sha }}
          path: clients/android/app/build/reports/kover/htmlDebug/
          if-no-files-found: ignore
          retention-days: 14

      - name: Lint
        working-directory: clients/android
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Assemble debug APK
        working-directory: clients/android
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload unit-test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gmvpn-unit-test-reports-${{ github.sha }}
          path: clients/android/app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: gmvpn-debug-apk-${{ github.sha }}
          path: clients/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
