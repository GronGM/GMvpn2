name: core

on:
  push:
    branches: [main]
    paths:
      - "core/**"
      - ".github/workflows/core.yml"
  pull_request:
    paths:
      - "core/**"
      - ".github/workflows/core.yml"

jobs:
  vet-and-test:
    name: go vet + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: core/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -race -count=1
