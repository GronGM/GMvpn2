name: core

on:
  push:
    branches: [main]
    paths:
      - "core/**"
      - ".github/workflows/core.yml"
  pull_request:
    paths:
      - "core/**"
      - ".github/workflows/core.yml"

jobs:
  vet-and-test:
    name: go vet + test + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: core/go.sum

      - name: go vet
        run: go vet ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Dependency advisory audit
        # Advisory-only — never block a release on a freshly-published
        # CVE. Findings still appear in the run log.
        continue-on-error: true
        run: govulncheck ./...

      - name: go test (race + coverage)
        run: |
          go test ./... -race -count=1 \
            -covermode=atomic -coverpkg=./... \
            -coverprofile=coverage.out
          go tool cover -func=coverage.out | tail -5
          mkdir -p coverage
          go tool cover -html=coverage.out -o coverage/index.html

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gmvpn-core-coverage-${{ github.sha }}
          path: core/coverage/
          if-no-files-found: ignore
          retention-days: 14
