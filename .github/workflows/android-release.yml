name: android-release

# Sign and publish a release APK on tag push (v*.*.*) or manual dispatch.
# Reuses the same build steps as android-aar.yml libs job, then runs
# `:app:assembleRelease` with a keystore decoded from a GitHub secret.
#
# Required repository secrets:
#   RELEASE_KEYSTORE_BASE64   base64 of the .jks keystore file
#   RELEASE_KEYSTORE_PASSWORD store password
#   RELEASE_KEY_ALIAS         signing key alias
#   RELEASE_KEY_PASSWORD      key password

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/version label to attach to the release (vX.Y.Z)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: build + sign + publish
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version label
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      # ---------- Native libs (Rust + Go) ----------

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Install cargo-ndk
        run: cargo install --locked cargo-ndk

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: core/go.sum

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: false

      - name: Export ANDROID_NDK_HOME
        run: echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build native libs
        run: ./scripts/build-android-libs.sh

      # ---------- Wire artifacts into the Android module ----------

      - name: Wire artifacts into app/
        run: |
          set -euxo pipefail
          mkdir -p clients/android/app/libs
          mkdir -p clients/android/app/src/main/jniLibs
          mkdir -p clients/android/app/src/main/kotlin/uniffi/gmvpn_ffi

          cp core/build/gmvpn.aar clients/android/app/libs/
          cp -R shared/target/android/jniLibs/* clients/android/app/src/main/jniLibs/
          cp shared/target/android/kotlin/uniffi/gmvpn_ffi/gmvpn_ffi.kt \
             clients/android/app/src/main/kotlin/uniffi/gmvpn_ffi/

      # ---------- Android SDK + signed release ----------

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Decode signing keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "RELEASE_KEYSTORE_BASE64 secret is not set; cannot sign release" >&2
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/signing"
          KS_PATH="$RUNNER_TEMP/signing/release.jks"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$KS_PATH"
          echo "RELEASE_KEYSTORE_PATH=$KS_PATH" >> "$GITHUB_ENV"

      - name: Make gradlew executable
        run: chmod +x clients/android/gradlew

      - name: Assemble release APK
        working-directory: clients/android
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Locate APK
        id: apk
        run: |
          path="$(ls clients/android/app/build/outputs/apk/release/*.apk | head -n1)"
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$path")" >> "$GITHUB_OUTPUT"

      - name: Compute checksum
        run: sha256sum "${{ steps.apk.outputs.path }}" > "${{ steps.apk.outputs.path }}.sha256"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: gmvpn-release-${{ steps.version.outputs.tag }}
          path: |
            ${{ steps.apk.outputs.path }}
            ${{ steps.apk.outputs.path }}.sha256
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: GMvpn ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.apk.outputs.path }}
            ${{ steps.apk.outputs.path }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
