name: android-release

# Manual-only Android RC packaging workflow.
#
# This workflow does not create git tags and does not publish GitHub
# Releases. It builds audit artifacts first, then requires all signing
# secrets before producing signed RC artifacts as GitHub Actions
# artifacts.
#
# Required repository secrets for the signed stage:
#   RELEASE_KEYSTORE_BASE64   base64 of the .jks/.keystore file
#   RELEASE_KEYSTORE_PASSWORD store password
#   RELEASE_KEY_ALIAS         signing key alias
#   RELEASE_KEY_PASSWORD      key password

on:
  workflow_dispatch:
    inputs:
      rc_tag:
        description: "RC label, for example android-v1.0.0-rc.1"
        required: true
        default: "android-v1.0.0-rc.1"
      version_name:
        description: "Android versionName expected in Gradle metadata"
        required: true
        default: "1.0.0-rc.1"

permissions:
  contents: read

jobs:
  package:
    name: build + package Android RC
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ANDROID_NDK_VERSION: "28.2.13676358"

    steps:
      - uses: actions/checkout@v6

      - name: Validate RC inputs
        env:
          RC_TAG: ${{ inputs.rc_tag }}
          VERSION_NAME: ${{ inputs.version_name }}
        run: |
          set -euo pipefail
          case "$RC_TAG" in
            android-v[0-9]*.[0-9]*.[0-9]*-rc.[0-9]*) ;;
            *)
              echo "::error title=Invalid rc_tag::Use a label like android-v1.0.0-rc.1"
              exit 1
              ;;
          esac
          grep -F "versionName = \"$VERSION_NAME\"" \
            clients/android/app/build.gradle.kts >/dev/null || {
              echo "::error title=Version mismatch::Gradle versionName does not match workflow input"
              exit 1
            }

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            shared/target
          key: android-release-libs-${{ runner.os }}-${{ hashFiles('shared/**/Cargo.toml', 'shared/**/Cargo.lock') }}
          restore-keys: |
            android-release-libs-${{ runner.os }}-

      - name: Install cargo-ndk
        run: cargo install --locked cargo-ndk

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: core/go.sum

      - name: Set up Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
          add-to-path: false

      - name: Export ANDROID_NDK_HOME
        run: echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build native artifacts
        run: ./scripts/build-android-libs.sh

      - name: Wire native artifacts into Android app
        run: |
          set -euxo pipefail
          mkdir -p clients/android/app/libs
          mkdir -p clients/android/app/src/main/jniLibs
          mkdir -p clients/android/app/src/main/kotlin/uniffi/gmvpn_ffi

          cp core/build/gmvpn.aar clients/android/app/libs/
          cp -R shared/target/android/jniLibs/* clients/android/app/src/main/jniLibs/
          kotlin_binding="$(find shared/target/android/kotlin \
            -type f -name gmvpn_ffi.kt | head -n1)"
          if [ -z "$kotlin_binding" ]; then
            echo "::error title=UniFFI binding missing::gmvpn_ffi.kt was not generated"
            find shared/target/android/kotlin -maxdepth 5 -type f | sort
            exit 1
          fi
          cp "$kotlin_binding" \
            clients/android/app/src/main/kotlin/uniffi/gmvpn_ffi/gmvpn_ffi.kt

      - name: Make gradlew executable
        run: chmod +x clients/android/gradlew

      - name: Build unsigned audit artifacts
        working-directory: clients/android
        run: |
          ./gradlew \
            :app:testDebugUnitTest \
            :app:lintDebug \
            :app:assembleRelease \
            :app:bundleRelease \
            --stacktrace

      - name: Check unsigned native ELF page alignment
        run: |
          ./scripts/check-android-16kb-elf-alignment.sh \
            clients/android/app/build/outputs/apk/release/app-release-unsigned.apk
          ./scripts/check-android-16kb-elf-alignment.sh \
            clients/android/app/build/outputs/bundle/release/app-release.aab

      - name: Check unsigned APK zip alignment
        run: |
          set -euo pipefail
          ZIPALIGN="$(find "$ANDROID_HOME/build-tools" -maxdepth 2 \
            \( -name zipalign -o -name zipalign.exe \) \
            | sort -V | tail -n1)"
          if [ -z "$ZIPALIGN" ]; then
            echo "::error title=zipalign missing::No zipalign found under $ANDROID_HOME/build-tools"
            exit 1
          fi
          "$ZIPALIGN" -c -P 16 -v 4 \
            clients/android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Checksum unsigned audit artifacts
        run: |
          set -euo pipefail
          mkdir -p clients/android/app/build/release-checksums
          find \
            clients/android/app/build/outputs/apk/release \
            clients/android/app/build/outputs/bundle/release \
            -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            > clients/android/app/build/release-checksums/unsigned-audit.sha256

      - name: Upload unsigned audit artifacts
        uses: actions/upload-artifact@v7
        with:
          name: gmvpn-android-${{ inputs.rc_tag }}-unsigned-audit
          path: |
            clients/android/app/build/outputs/apk/release/*
            clients/android/app/build/outputs/bundle/release/*
            clients/android/app/build/release-checksums/unsigned-audit.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Require signing secrets
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for name in \
            RELEASE_KEYSTORE_BASE64 \
            RELEASE_KEYSTORE_PASSWORD \
            RELEASE_KEY_ALIAS \
            RELEASE_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "::error title=Missing release signing secret::$name is not configured"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Unsigned audit artifacts were built, but signed RC artifacts were not produced." >&2
            echo "Configure the required repository secrets before using this workflow for distribution." >&2
            exit 1
          fi

      - name: Decode signing keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/signing"
          KS_PATH="$RUNNER_TEMP/signing/release.keystore"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$KS_PATH"
          chmod 600 "$KS_PATH"
          echo "RELEASE_KEYSTORE_PATH=$KS_PATH" >> "$GITHUB_ENV"

      - name: Build signed RC artifacts
        working-directory: clients/android
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew \
            :app:assembleRelease \
            :app:bundleRelease \
            --stacktrace \
            --rerun-tasks

      - name: Check signed native ELF page alignment
        run: |
          signed_apk="$(find clients/android/app/build/outputs/apk/release \
            -maxdepth 1 -type f -name '*.apk' ! -name '*unsigned*' | head -n1)"
          if [ -z "$signed_apk" ]; then
            echo "::error title=Signed APK missing::No signed release APK was produced"
            exit 1
          fi
          ./scripts/check-android-16kb-elf-alignment.sh "$signed_apk"
          ./scripts/check-android-16kb-elf-alignment.sh \
            clients/android/app/build/outputs/bundle/release/app-release.aab

      - name: Verify signed APK
        run: |
          set -euo pipefail
          signed_apk="$(find clients/android/app/build/outputs/apk/release \
            -maxdepth 1 -type f -name '*.apk' ! -name '*unsigned*' | head -n1)"
          if [ -z "$signed_apk" ]; then
            echo "::error title=Signed APK missing::No signed release APK was produced"
            exit 1
          fi
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -maxdepth 2 \
            \( -name apksigner -o -name apksigner.bat \) \
            | sort -V | tail -n1)"
          if [ -z "$APKSIGNER" ]; then
            echo "::error title=apksigner missing::No apksigner found under $ANDROID_HOME/build-tools"
            exit 1
          fi
          "$APKSIGNER" verify --verbose --print-certs "$signed_apk"

      - name: Check signed APK zip alignment
        run: |
          set -euo pipefail
          signed_apk="$(find clients/android/app/build/outputs/apk/release \
            -maxdepth 1 -type f -name '*.apk' ! -name '*unsigned*' | head -n1)"
          if [ -z "$signed_apk" ]; then
            echo "::error title=Signed APK missing::No signed release APK was produced"
            exit 1
          fi
          ZIPALIGN="$(find "$ANDROID_HOME/build-tools" -maxdepth 2 \
            \( -name zipalign -o -name zipalign.exe \) \
            | sort -V | tail -n1)"
          if [ -z "$ZIPALIGN" ]; then
            echo "::error title=zipalign missing::No zipalign found under $ANDROID_HOME/build-tools"
            exit 1
          fi
          "$ZIPALIGN" -c -P 16 -v 4 "$signed_apk"

      - name: Checksum signed RC artifacts
        run: |
          set -euo pipefail
          signed_apk="$(find clients/android/app/build/outputs/apk/release \
            -maxdepth 1 -type f -name '*.apk' ! -name '*unsigned*' | head -n1)"
          bundle="clients/android/app/build/outputs/bundle/release/app-release.aab"
          test -n "$signed_apk"
          test -f "$bundle"
          mkdir -p clients/android/app/build/release-checksums
          sha256sum "$signed_apk" "$bundle" \
            > clients/android/app/build/release-checksums/signed-rc.sha256

      - name: Upload signed RC artifacts
        uses: actions/upload-artifact@v7
        with:
          name: gmvpn-android-${{ inputs.rc_tag }}-signed
          path: |
            clients/android/app/build/outputs/apk/release/*.apk
            !clients/android/app/build/outputs/apk/release/*unsigned*.apk
            clients/android/app/build/outputs/bundle/release/app-release.aab
            clients/android/app/build/release-checksums/signed-rc.sha256
          if-no-files-found: error
          retention-days: 30
