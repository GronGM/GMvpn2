name: shared

on:
  push:
    branches: [main]
    paths:
      - "shared/**"
      - ".github/workflows/shared.yml"
  pull_request:
    paths:
      - "shared/**"
      - ".github/workflows/shared.yml"

jobs:
  lint-and-test:
    name: fmt + clippy + test + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shared
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            shared/target
          key: shared-${{ runner.os }}-${{ hashFiles('shared/**/Cargo.toml', 'shared/**/Cargo.lock') }}
          restore-keys: |
            shared-${{ runner.os }}-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy (warnings as errors)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Dependency advisory audit
        # Advisory-only — never block a release on a freshly-published
        # CVE. Findings still appear in the run log so they can't be
        # missed.
        continue-on-error: true
        run: cargo audit --color always

      - name: Tests with coverage
        run: |
          cargo llvm-cov --workspace --all-targets \
            --html --output-dir target/llvm-cov-html
          cargo llvm-cov report --summary-only

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gmvpn-shared-coverage-${{ github.sha }}
          path: shared/target/llvm-cov-html/
          if-no-files-found: ignore
          retention-days: 14
