name: Отзыв тестера Android
description: Оставить общий отзыв по тестированию предрелизного Android APK.
title: "[Android отзыв]: "
labels:
  - android
  - apk
  - rc4
  - tester-feedback
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Используйте эту форму для общего отзыва по тестированию RC APK.

        Не раскрывайте секретные данные VPN. Не вставляйте ссылки подписок,
        URI профилей, пароли, приватные ключи, raw logcat или скриншоты
        без редактирования приватных данных.
  - type: input
    id: phone_model
    attributes:
      label: Модель телефона
      placeholder: "Модель телефона"
    validations:
      required: true
  - type: input
    id: android_version
    attributes:
      label: Версия Android
      placeholder: "Android 12 / API 31"
    validations:
      required: true
  - type: input
    id: gmvpn_version
    attributes:
      label: Версия GMvpn
      placeholder: "1.0.0-rc.4"
    validations:
      required: true
  - type: input
    id: apk_source
    attributes:
      label: Откуда установлен APK
      placeholder: "GitHub Pre-release android-v1.0.0-rc.4"
    validations:
      required: true
  - type: dropdown
    id: install_result
    attributes:
      label: Результат установки
      options:
        - "Установилось успешно"
        - "Установка не удалась"
        - "Не тестировалось"
    validations:
      required: true
  - type: dropdown
    id: connect_result
    attributes:
      label: Результат подключения/отключения
      options:
        - "Подключение и отключение сработали"
        - "Подключение не сработало"
        - "Отключение не сработало"
        - "Не тестировалось"
    validations:
      required: true
  - type: dropdown
    id: browsing_result
    attributes:
      label: Базовая проверка сайтов через VPN
      options:
        - "Работает"
        - "Не работает"
        - "Не тестировалось"
    validations:
      required: true
  - type: input
    id: profile_type
    attributes:
      label: Тип профиля, без секретов
      description: Укажите только протокол или тип источника. Не вставляйте URI, hostname, пароли, ключи или ссылки подписок.
      placeholder: "VLESS / VMess / Trojan / Shadowsocks / subscription import"
    validations:
      required: false
  - type: textarea
    id: feedback
    attributes:
      label: Отзыв
      description: Что сработало, что было непонятно, что стоит улучшить?
      placeholder: "Напишите отзыв здесь."
    validations:
      required: true
  - type: textarea
    id: limitations
    attributes:
      label: Сетевые проверки, если тестировались
      description: Необязательно. Кратко опишите DNS, UDP или IPv6 без приватных endpoints и raw IP.
      placeholder: "DNS: не тестировалось. UDP: не тестировалось. IPv6: не тестировалось."
    validations:
      required: false
  - type: checkboxes
    id: privacy_confirmation
    attributes:
      label: Подтверждение приватности
      options:
        - label: Я не прикрепил(а) приватные ключи, пароли, токены, ссылки подписок, полные URI VPN-профилей, raw logcat или скриншоты с персональными данными.
          required: true
