name: Отзыв тестера Android
description: Оставить общий отзыв по тестированию Android RC APK.
title: "[Android отзыв]: "
labels:
  - android
  - feedback
body:
  - type: markdown
    attributes:
      value: |
        Используйте эту форму для общего отзыва по тестированию RC APK.

        Не раскрывайте VPN credentials. Не вставляйте subscription URLs,
        URI профилей, пароли, приватные ключи, raw logcat или скриншоты
        без редактирования приватных данных.
  - type: input
    id: phone_model
    attributes:
      label: Модель телефона
      placeholder: "Модель телефона"
    validations:
      required: true
  - type: input
    id: android_version
    attributes:
      label: Версия Android
      placeholder: "Android 12 / API 31"
    validations:
      required: true
  - type: input
    id: gmvpn_version
    attributes:
      label: Версия GMvpn
      placeholder: "1.0.0-rc.3"
    validations:
      required: true
  - type: input
    id: apk_source
    attributes:
      label: Откуда установлен APK
      placeholder: "GitHub Pre-release android-v1.0.0-rc.3"
    validations:
      required: true
  - type: dropdown
    id: install_result
    attributes:
      label: Результат установки
      options:
        - "Установилось успешно"
        - "Установка не удалась"
        - "Не тестировалось"
    validations:
      required: true
  - type: dropdown
    id: connect_result
    attributes:
      label: Результат connect/disconnect
      options:
        - "Connect и disconnect сработали"
        - "Connect не сработал"
        - "Disconnect не сработал"
        - "Не тестировалось"
    validations:
      required: true
  - type: dropdown
    id: browsing_result
    attributes:
      label: Базовый browsing через VPN
      options:
        - "Работает"
        - "Не работает"
        - "Не тестировалось"
    validations:
      required: true
  - type: input
    id: profile_type
    attributes:
      label: Тип профиля, без секретов
      description: Укажите только протокол или тип источника. Не вставляйте URI, hostname, пароли, ключи или subscription URLs.
      placeholder: "VLESS / VMess / Trojan / Shadowsocks / subscription import"
    validations:
      required: false
  - type: textarea
    id: feedback
    attributes:
      label: Отзыв
      description: Что сработало, что было непонятно, что стоит улучшить?
      placeholder: "Напишите отзыв здесь."
    validations:
      required: true
  - type: textarea
    id: limitations
    attributes:
      label: Сетевые проверки, если тестировались
      description: Необязательно. Кратко опишите DNS, UDP или IPv6 без приватных endpoint и raw IP.
      placeholder: "DNS: не тестировалось. UDP: не тестировалось. IPv6: не тестировалось."
    validations:
      required: false
  - type: checkboxes
    id: privacy_confirmation
    attributes:
      label: Подтверждение приватности
      options:
        - label: Я не прикрепил(а) приватные ключи, пароли, токены, subscription URLs, полные URI VPN-профилей, raw logcat или скриншоты с персональными данными.
          required: true
