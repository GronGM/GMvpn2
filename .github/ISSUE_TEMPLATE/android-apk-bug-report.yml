name: Баг в Android APK
description: Сообщить о проблеме при тестировании предрелизного Android APK.
title: "[Android APK баг]: "
labels:
  - android
  - apk
  - v1.0.0
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Используйте эту форму для багов, найденных в Android APK,
        установленном вручную.

        Не прикрепляйте приватные VPN-профили, ссылки подписок, пароли,
        приватные ключи, raw logcat или скриншоты с персональными данными.
  - type: input
    id: phone_model
    attributes:
      label: Модель телефона
      description: Например: TECNO LG8n, Pixel 8, Samsung Galaxy S23.
      placeholder: "Модель телефона"
    validations:
      required: true
  - type: input
    id: android_version
    attributes:
      label: Версия Android
      description: Укажите версию Android и API level, если знаете.
      placeholder: "Android 12 / API 31"
    validations:
      required: true
  - type: input
    id: gmvpn_version
    attributes:
      label: Версия GMvpn
      description: Версия из приложения или со страницы релиза.
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: apk_source
    attributes:
      label: Откуда установлен APK
      description: Где вы скачали или получили APK?
      placeholder: "GitHub Pre-release android-v1.0.0"
    validations:
      required: true
  - type: dropdown
    id: vpn_permission_dialog
    attributes:
      label: Появлялся ли системный Android VPN permission dialog?
      options:
        - "Да"
        - "Нет"
        - "Не уверен(а)"
    validations:
      required: true
  - type: input
    id: profile_type
    attributes:
      label: Тип профиля, без секретов
      description: Укажите только протокол или тип источника. Не вставляйте URI, hostname, пароли, ключи или ссылки подписок.
      placeholder: "VLESS / VMess / Trojan / Shadowsocks / subscription import"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      description: Опишите минимальный набор действий, который приводит к проблеме.
      placeholder: |
        1. Установил(а) v1.0.0 APK.
        2. Добавил(а) тестовый профиль без секретов.
        3. Нажал(а) "Подключиться".
        4. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемый результат
      placeholder: "Что должно было произойти?"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Фактический результат
      placeholder: "Что произошло вместо этого?"
    validations:
      required: true
  - type: textarea
    id: screenshot
    attributes:
      label: Скриншот, если безопасно
      description: Прикрепляйте скриншот только если на нём нет персональных данных, имён серверов, IP-адресов, учётных данных, ссылок подписок или личных сообщений.
      placeholder: "Перетащите сюда отредактированный скриншот или напишите 'не прикладываю'."
    validations:
      required: false
  - type: checkboxes
    id: privacy_confirmation
    attributes:
      label: Подтверждение приватности
      options:
        - label: Я не прикрепил(а) приватные ключи, пароли, токены, ссылки подписок, полные URI VPN-профилей, raw logcat или скриншоты с персональными данными.
          required: true
